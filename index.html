<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BioDome Control | Project Synthetos</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        :root {
            --neon-green: #39ff14;
            --dark-bg: #0a0a12;
            --panel-bg: #1a1a24;
            --alert-red: #ff2a2a;
        }

        body {
            font-family: 'Courier New', monospace;
            background-color: var(--dark-bg);
            color: white;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            touch-action: manipulation; /* Improves touch response */
        }

        /* --- Dashboard UI --- */
        #dashboard {
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--neon-green);
            padding-bottom: 10px;
            position: relative;
        }

        .video-container {
            width: 100%;
            background: #000;
            border: 2px solid var(--neon-green);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }

        #camFeed {
            width: 100%;
            display: block;
            /* Camera is upside down, physical flip in Pi code, 
               but if Pi code fails, uncomment below: */
            /* transform: rotate(180deg); */
            transition: transform 0.3s;
        }

        .video-container.enlarged {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 999;
            background: black;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .grid-readings {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
        }

        .card {
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--neon-green);
            text-align: center;
        }

        .card h3 { margin: 0; font-size: 0.8rem; color: #888; }
        .card span { font-size: 1.5rem; font-weight: bold; }

        .controls {
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 8px;
        }

        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        /* Easter Egg Icon */
        #strawberry {
            position: absolute;
            right: 10px;
            top: 10px;
            font-size: 24px;
            cursor: pointer;
            user-select: none;
            opacity: 0.7;
        }

        /* --- Game UI --- */
        #gameLayer {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #111;
            z-index: 1000;
        }

        canvas { display: block; width: 100%; height: 100%; }

        .game-ui {
            position: absolute;
            pointer-events: none; /* Let clicks pass to canvas */
            width: 100%; height: 100%;
            top: 0; left: 0;
        }

        .health-bar {
            position: absolute;
            height: 20px;
            background: #333;
            border: 2px solid white;
        }
        #bossHealth { top: 20px; left: 10%; width: 80%; }
        #bossHealthFill { width: 100%; height: 100%; background: red; transition: width 0.2s; }
        #playerHealth { top: 50px; left: 10%; width: 30%; height: 10px; }
        #playerHealthFill { width: 100%; height: 100%; background: var(--neon-green); }

        #gameMessage {
            position: absolute;
            top: 40%; width: 100%;
            text-align: center;
            font-size: 3rem;
            color: white;
            text-shadow: 0 0 10px red;
            display: none;
        }

        .mobile-controls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            height: 150px;
            pointer-events: auto;
            display: none; /* Hidden on PC */
        }

        #joystick {
            position: absolute;
            left: 30px; bottom: 30px;
            width: 100px; height: 100px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .action-btn {
            position: absolute;
            width: 60px; height: 60px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center; justify-content: center;
        }
        #btnDash { right: 110px; bottom: 30px; }
        #btnShoot { right: 30px; bottom: 60px; background: rgba(255,0,0,0.3); }

        #exitGame {
            position: absolute;
            top: 10px; left: 10px;
            pointer-events: auto;
            padding: 10px;
            background: #333;
            color: white;
            border: 1px solid white;
            cursor: pointer;
        }

        /* --- Input Styling --- */
        button.ctrl-btn {
            background: #333;
            color: white;
            border: 1px solid var(--neon-green);
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        button.ctrl-btn.active { background: var(--neon-green); color: black; }
    </style>
</head>
<body>

    <div id="dashboard">
        <header>
            <h1>BioDome OS v1.0</h1>
            <div id="strawberry">🍓</div>
        </header>

        <div class="video-container" id="vidCont">
            <img id="camFeed" src="" alt="Waiting for Stream...">
        </div>

        <div class="grid-readings">
            <div class="card"><h3>TEMP</h3><span id="dispTemp">--</span>°C</div>
            <div class="card"><h3>HUMIDITY</h3><span id="dispHum">--</span>%</div>
            <div class="card"><h3>SOIL 1</h3><span id="dispSoil1">--</span>%</div>
            <div class="card"><h3>SOIL 2</h3><span id="dispSoil2">--</span>%</div>
            <div class="card"><h3>N-P-K</h3><span id="dispNPK">--</span></div>
        </div>

        <div class="controls">
            <div class="toggle-row">
                <span>Mode: <strong id="modeText">AUTO</strong></span>
                <label class="switch">
                    <input type="checkbox" id="modeSwitch">
                    <span class="slider"></span>
                </label>
            </div>
            <div id="manualControls" style="display:none; opacity: 0.5;">
                <p>Manual Overrides:</p>
                <div class="toggle-row">Exhaust Fan: <button class="ctrl-btn" onclick="toggle('exhaust')">OFF</button></div>
                <div class="toggle-row">Peltier Sys: <button class="ctrl-btn" onclick="toggle('peltier')">OFF</button></div>
                <div class="toggle-row">Water Pump: <button class="ctrl-btn" onclick="toggle('pump_w')">OFF</button></div>
                <div class="toggle-row">Nutri Pump: <button class="ctrl-btn" onclick="toggle('pump_n')">OFF</button></div>
            </div>
        </div>
    </div>

    <div id="gameLayer">
        <canvas id="gameCanvas"></canvas>
        <div class="game-ui">
            <div id="exitGame">EXIT SIMULATION</div>
            <div class="health-bar" id="bossHealth"><div id="bossHealthFill"></div></div>
            <div class="health-bar" id="playerHealth"><div id="playerHealthFill"></div></div>
            <div id="gameMessage"></div>
            
            <div class="mobile-controls" id="mobCtrl">
                <div id="joystick"></div>
                <div class="action-btn" id="btnDash">DASH</div>
                <div class="action-btn" id="btnShoot">FIRE</div>
            </div>
        </div>
    </div>

    <script>
        // --- IOT LOGIC ---
        const socket = io("https://smart-greenhouse-h3ow.onrender.com"); // REPLACE WITH RENDER URL
        
        // Sensor Updates
        socket.on('update_sensors', (data) => {
            document.getElementById('dispTemp').innerText = data.temp.toFixed(1);
            document.getElementById('dispHum').innerText = data.hum.toFixed(1);
            document.getElementById('dispSoil1').innerText = data.soil1;
            document.getElementById('dispSoil2').innerText = data.soil2;
            document.getElementById('dispNPK').innerText = `${data.n}-${data.p}-${data.k}`;
        });

        // Video Feed
        socket.on('video_stream', (data) => {
            document.getElementById('camFeed').src = "data:image/jpeg;base64," + data;
        });

        // UI Logic
        const vidCont = document.getElementById('vidCont');
        vidCont.addEventListener('dblclick', () => {
            vidCont.classList.toggle('enlarged');
        });

        const modeSwitch = document.getElementById('modeSwitch');
        modeSwitch.addEventListener('change', (e) => {
            const isManual = e.target.checked;
            document.getElementById('modeText').innerText = isManual ? "MANUAL" : "AUTO";
            const mc = document.getElementById('manualControls');
            mc.style.display = isManual ? 'block' : 'none';
            mc.style.opacity = isManual ? '1' : '0.5';
            
            socket.emit('send_command', { mode: isManual ? 'manual' : 'auto' });
        });

        function toggle(device) {
            // Simple toggle logic would require tracking state, simplifying for brevity:
            // In a real app, you'd toggle a variable and send boolean true/false
            socket.emit('send_command', { [device]: true }); // Sending 'true' for now to turn on
        }

        // --- GAME LOGIC: BOSS BATTLE ---
        const strawberry = document.getElementById('strawberry');
        const gameLayer = document.getElementById('gameLayer');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameLoopId;

        strawberry.addEventListener('dblclick', startGame);
        document.getElementById('exitGame').addEventListener('click', stopGame);

        // Game State
        const player = { x: 0, y: 0, size: 20, speed: 5, color: '#39ff14', hp: 100, dashCd: 0, iframes: 0, bullets: [] };
        const boss = { x: 0, y: 0, size: 60, color: 'red', hp: 1000, state: 'IDLE', timer: 0, projectiles: [] };
        const keys = {};
        let isMobile = /Android|iPhone/i.test(navigator.userAgent);

        function startGame() {
            document.getElementById('dashboard').style.display = 'none';
            gameLayer.style.display = 'block';
            if(isMobile) document.getElementById('mobCtrl').style.display = 'block';
            resize();
            resetGame();
            gameLoopId = requestAnimationFrame(update);
        }

        function stopGame() {
            cancelAnimationFrame(gameLoopId);
            gameLayer.style.display = 'none';
            document.getElementById('dashboard').style.display = 'flex';
        }

        function resetGame() {
            player.x = canvas.width / 2;
            player.y = canvas.height - 100;
            player.hp = 100;
            boss.x = canvas.width / 2;
            boss.y = 100;
            boss.hp = 1000;
            boss.projectiles = [];
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);

        // Input
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        // Mobile Input Placeholders
        document.getElementById('btnShoot').addEventListener('touchstart', () => shoot());
        document.getElementById('btnDash').addEventListener('touchstart', () => dash());

        function shoot() {
            player.bullets.push({x: player.x, y: player.y, vx: 0, vy: -10});
        }

        function dash() {
            if (player.dashCd <= 0) {
                player.iframes = 30;
                player.dashCd = 100;
                // Add velocity burst logic here
            }
        }

        function update() {
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // --- Player Logic ---
            if (keys['ArrowUp'] || keys['KeyW']) player.y -= player.speed;
            if (keys['ArrowDown'] || keys['KeyS']) player.y += player.speed;
            if (keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed;
            if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;
            if ((keys['Space'] || keys['KeyK']) && player.dashCd === 0) dash(); // Simple dash trigger
            if (keys['KeyJ'] && Math.random() > 0.8) shoot(); // Auto fire for PC test

            // Player Render
            ctx.fillStyle = player.iframes > 0 ? 'white' : player.color;
            ctx.beginPath(); ctx.arc(player.x, player.y, player.size, 0, Math.PI*2); ctx.fill();

            // Bullets
            ctx.fillStyle = 'yellow';
            player.bullets.forEach((b, i) => {
                b.y += b.vy;
                ctx.fillRect(b.x-2, b.y-2, 4, 10);
                if(b.y < 0) player.bullets.splice(i, 1);
                
                // Hit Boss
                const dx = b.x - boss.x;
                const dy = b.y - boss.y;
                if (Math.sqrt(dx*dx + dy*dy) < boss.size) {
                    boss.hp -= 5;
                    player.bullets.splice(i, 1);
                }
            });

            // --- Boss AI: Synthetos ---
            // Boss Render
            ctx.fillStyle = boss.color;
            ctx.beginPath(); 
            // Draw Boss (Triangle shape for now)
            ctx.moveTo(boss.x, boss.y - boss.size);
            ctx.lineTo(boss.x - boss.size, boss.y + boss.size);
            ctx.lineTo(boss.x + boss.size, boss.y + boss.size);
            ctx.fill();

            // Boss Name
            ctx.fillStyle = "white";
            ctx.font = "20px Arial";
            ctx.textAlign = "center";
            ctx.fillText("SYNTHETOS THE OVERGROWN", boss.x, boss.y - boss.size - 20);

            // Boss Logic (Simple State Machine)
            boss.timer++;
            if (boss.timer % 60 === 0) {
                // Pick attack
                const rand = Math.random();
                if (rand < 0.3) fireBossProjectile_Spread();
                else if (rand < 0.6) fireBossProjectile_Aimed();
                else boss.x += (Math.random() - 0.5) * 100; // Move
            }

            // Boss Projectiles
            ctx.fillStyle = 'orange';
            boss.projectiles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fill();
                
                // Hit Player
                const pdx = p.x - player.x;
                const pdy = p.y - player.y;
                if (Math.sqrt(pdx*pdx + pdy*pdy) < player.size && player.iframes <= 0) {
                    player.hp -= 10;
                    player.iframes = 20; // Hit immunity
                    boss.projectiles.splice(i, 1);
                }
                
                if (p.y > canvas.height || p.y < 0 || p.x < 0 || p.x > canvas.width) boss.projectiles.splice(i, 1);
            });

            // Update UI Bars
            document.getElementById('bossHealthFill').style.width = (boss.hp / 1000 * 100) + "%";
            document.getElementById('playerHealthFill').style.width = player.hp + "%";

            // Cooldowns
            if (player.dashCd > 0) player.dashCd--;
            if (player.iframes > 0) player.iframes--;

            gameLoopId = requestAnimationFrame(update);
        }

        function fireBossProjectile_Spread() {
            for(let i=-2; i<=2; i++) {
                boss.projectiles.push({x: boss.x, y: boss.y, vx: i*2, vy: 5});
            }
        }

        function fireBossProjectile_Aimed() {
            const angle = Math.atan2(player.y - boss.y, player.x - boss.x);
            boss.projectiles.push({
                x: boss.x, y: boss.y,
                vx: Math.cos(angle) * 7,
                vy: Math.sin(angle) * 7
            });
        }

    </script>
</body>
</html>
